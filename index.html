<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GirlTalk Chat Insights</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f1a;color:#e0e0e0;padding:20px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
h1{font-size:24px;color:#f0c4e8}
.run-btn{background:#9b59b6;color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px}
.run-btn:hover{background:#8e44ad}
.run-btn:disabled{opacity:.5;cursor:not-allowed}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#1a1a2e;border-radius:12px;padding:20px;text-align:center}
.stat-card .value{font-size:32px;font-weight:700;color:#f0c4e8}
.stat-card .label{font-size:13px;color:#888;margin-top:4px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:20px;margin-bottom:24px}
.card{background:#1a1a2e;border-radius:12px;padding:20px}
.card h2{font-size:16px;color:#f0c4e8;margin-bottom:16px}
.insight{background:#16213e;border-left:3px solid #9b59b6;padding:10px 14px;margin-bottom:8px;border-radius:0 8px 8px 0;font-size:13px;line-height:1.5}
.pain-point{display:flex;justify-content:space-between;align-items:start;padding:10px 0;border-bottom:1px solid #2a2a4a}
.pain-point:last-child{border:none}
.pain-desc{flex:1;font-size:13px;line-height:1.4}
.pain-freq{background:#9b59b6;color:#fff;border-radius:12px;padding:2px 10px;font-size:12px;margin-left:10px;white-space:nowrap}
.snippet{font-size:11px;color:#888;font-style:italic;margin-top:4px}
.topic-bar{display:flex;align-items:center;margin-bottom:10px}
.topic-name{width:180px;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topic-fill{flex:1;height:24px;background:#2a2a4a;border-radius:4px;overflow:hidden;margin:0 10px}
.topic-fill-inner{height:100%;background:linear-gradient(90deg,#9b59b6,#e74c8b);border-radius:4px;transition:width .5s}
.topic-pct{width:50px;text-align:right;font-size:13px;color:#888}
.status{text-align:center;padding:40px;color:#888;font-size:14px}
.last-run{font-size:12px;color:#666}
canvas{max-height:220px}
</style>
</head>
<body>
<div class="header">
<div><h1>GirlTalk Chat Insights</h1><div class="last-run" id="lastRun"></div></div>
<button class="run-btn" id="runBtn" onclick="runAnalysis()">Run Analysis Now</button>
</div>
<div class="stats" id="stats"></div>
<div class="grid">
<div class="card"><h2>Sentiment Distribution</h2><canvas id="sentimentChart"></canvas></div>
<div class="card"><h2>Top Topics</h2><div id="topics"></div></div>
</div>
<div class="grid">
<div class="card"><h2>Pain Points</h2><div id="painPoints"></div></div>
<div class="card"><h2>Key Insights</h2><div id="insights"></div></div>
</div>
<script>
firebase.initializeApp({apiKey:"AIzaSyDummy",authDomain:"girltalk-9b4f8.firebaseapp.com",projectId:"girltalk-9b4f8"});
const db=firebase.firestore();
const FUNCTION_URL="https://us-central1-girltalk-9b4f8.cloudfunctions.net/analyzeChats";

async function loadData(){
  const metaSnap=await db.collection("chatInsights").doc("_metadata").get();
  if(!metaSnap.exists)return document.getElementById("stats").innerHTML='<div class="status">No analysis data yet. Click "Run Analysis Now".</div>';
  const lastKey=metaSnap.data().lastRunDate;
  const snap=await db.collection("chatInsights").doc(lastKey).get();
  if(!snap.exists)return;
  const d=snap.data();
  document.getElementById("lastRun").textContent="Last run: "+new Date(d.runDate).toLocaleString()+" | "+d.totalChatsAnalyzed+" chats, "+d.totalMessagesAnalyzed+" messages";
  document.getElementById("stats").innerHTML=[
    {v:d.totalChatsAnalyzed,l:"Conversations"},
    {v:d.totalMessagesAnalyzed,l:"Messages"},
    {v:(d.engagement&&d.engagement.avgMessageCount||0).toFixed(1),l:"Avg Msgs/Chat"},
    {v:Math.round(d.sentiment&&d.sentiment.negative||0)+"%",l:"Negative Sentiment"}
  ].map(function(s){return '<div class="stat-card"><div class="value">'+s.v+'</div><div class="label">'+s.l+'</div></div>'}).join("");

  var ctx=document.getElementById("sentimentChart").getContext("2d");
  new Chart(ctx,{type:"doughnut",data:{labels:["Positive","Neutral","Negative"],datasets:[{data:[d.sentiment&&d.sentiment.positive||0,d.sentiment&&d.sentiment.neutral||0,d.sentiment&&d.sentiment.negative||0],backgroundColor:["#2ecc71","#95a5a6","#e74c3c"],borderWidth:0}]},options:{responsive:true,plugins:{legend:{position:"bottom",labels:{color:"#ccc"}}}}});

  var maxCount=1;
  if(d.topics&&d.topics.length>0){for(var i=0;i<d.topics.length;i++){if(d.topics[i].count>maxCount)maxCount=d.topics[i].count}}
  var topicsHtml="";
  if(d.topics&&d.topics.length>0){for(var i=0;i<d.topics.length;i++){var t=d.topics[i];topicsHtml+='<div class="topic-bar"><div class="topic-name">'+t.name+'</div><div class="topic-fill"><div class="topic-fill-inner" style="width:'+(t.count/maxCount*100)+'%"></div></div><div class="topic-pct">'+t.percentage+'%</div></div>'}}
  else{topicsHtml='<div class="status">No topics</div>'}
  document.getElementById("topics").innerHTML=topicsHtml;

  var painHtml="";
  if(d.painPoints&&d.painPoints.length>0){for(var i=0;i<d.painPoints.length;i++){var p=d.painPoints[i];var snip="";if(p.exampleSnippets&&p.exampleSnippets.length>0){snip='<div class="snippet">"'+p.exampleSnippets[0]+'"</div>'}painHtml+='<div class="pain-point"><div><div class="pain-desc">'+p.description+'</div>'+snip+'</div><div class="pain-freq">'+p.frequency+'x</div></div>'}}
  else{painHtml='<div class="status">No pain points</div>'}
  document.getElementById("painPoints").innerHTML=painHtml;

  var insHtml="";
  if(d.keyInsights&&d.keyInsights.length>0){for(var i=0;i<d.keyInsights.length;i++){insHtml+='<div class="insight">'+d.keyInsights[i]+'</div>'}}
  else{insHtml='<div class="status">No insights</div>'}
  document.getElementById("insights").innerHTML=insHtml;
}

async function runAnalysis(){
  var btn=document.getElementById("runBtn");
  btn.disabled=true;btn.textContent="Analyzing...";
  try{
    var r=await fetch(FUNCTION_URL+"?days=30&full=true");
    var j=await r.json();
    if(j.success){btn.textContent="Done! Reloading...";setTimeout(function(){location.reload()},1000)}
    else{btn.textContent="Error: "+j.error;setTimeout(function(){btn.disabled=false;btn.textContent="Run Analysis Now"},3000)}
  }catch(e){btn.textContent="Error";setTimeout(function(){btn.disabled=false;btn.textContent="Run Analysis Now"},3000)}
}
loadData();
</script>
</body>
</html>
