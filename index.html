<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GirlTalk Chat Insights</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f1a;color:#e0e0e0;padding:20px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
h1{font-size:24px;color:#f0c4e8}
.header-actions{display:flex;gap:10px;align-items:center}
.run-btn{background:#9b59b6;color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px}
.run-btn:hover{background:#8e44ad}
.run-btn:disabled{opacity:.5;cursor:not-allowed}
.status-box{background:#1a1a2e;border:1px solid #3a3a5a;border-radius:10px;padding:14px 18px;margin-bottom:20px;font-size:13px;line-height:1.6;display:none}
.status-box.visible{display:block}
.status-box .status-title{color:#f0c4e8;font-weight:600;margin-bottom:6px}
.status-box .status-msg{color:#aaa}
.status-box.error{border-color:#e74c3c}
.status-box.error .status-title{color:#e74c3c}
.status-box.success{border-color:#2ecc71}
.status-box.success .status-title{color:#2ecc71}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:2px solid #2a2a4a;padding-bottom:0}
.tab{background:none;border:none;color:#888;padding:10px 20px;cursor:pointer;font-size:14px;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab:hover{color:#ccc}
.tab.active{color:#f0c4e8;border-bottom-color:#9b59b6}

/* Week picker */
.week-picker{display:flex;align-items:center;gap:8px}
.week-picker select{background:#1a1a2e;color:#e0e0e0;border:1px solid #3a3a5a;padding:8px 12px;border-radius:8px;font-size:13px;cursor:pointer}
.week-picker select:focus{outline:none;border-color:#9b59b6}

/* Stats & Cards */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#1a1a2e;border-radius:12px;padding:20px;text-align:center}
.stat-card .value{font-size:32px;font-weight:700;color:#f0c4e8}
.stat-card .label{font-size:13px;color:#888;margin-top:4px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:20px;margin-bottom:24px}
.card{background:#1a1a2e;border-radius:12px;padding:20px}
.card h2{font-size:16px;color:#f0c4e8;margin-bottom:16px}
.insight{background:#16213e;border-left:3px solid #9b59b6;padding:10px 14px;margin-bottom:8px;border-radius:0 8px 8px 0;font-size:13px;line-height:1.5}
.pain-point{display:flex;justify-content:space-between;align-items:start;padding:10px 0;border-bottom:1px solid #2a2a4a}
.pain-point:last-child{border:none}
.pain-desc{flex:1;font-size:13px;line-height:1.4}
.pain-freq{background:#9b59b6;color:#fff;border-radius:12px;padding:2px 10px;font-size:12px;margin-left:10px;white-space:nowrap}
.snippet{font-size:11px;color:#888;font-style:italic;margin-top:4px}
.topic-bar{display:flex;align-items:center;margin-bottom:10px}
.topic-name{width:180px;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topic-fill{flex:1;height:24px;background:#2a2a4a;border-radius:4px;overflow:hidden;margin:0 10px}
.topic-fill-inner{height:100%;background:linear-gradient(90deg,#9b59b6,#e74c8b);border-radius:4px;transition:width .5s}
.topic-pct{width:50px;text-align:right;font-size:13px;color:#888}
.status{text-align:center;padding:40px;color:#888;font-size:14px}
.last-run{font-size:12px;color:#666}
canvas{max-height:220px}

/* Conversations view */
.conversations-controls{display:flex;gap:10px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.conversations-controls select,.conversations-controls input{background:#1a1a2e;color:#e0e0e0;border:1px solid #3a3a5a;padding:8px 12px;border-radius:8px;font-size:13px}
.conversations-controls input{flex:1;min-width:200px}
.conversations-controls input:focus,.conversations-controls select:focus{outline:none;border-color:#9b59b6}
.load-btn{background:#9b59b6;color:#fff;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px}
.load-btn:hover{background:#8e44ad}
.load-btn:disabled{opacity:.5;cursor:not-allowed}

.convo-list{display:flex;flex-direction:column;gap:8px}
.convo-item{background:#1a1a2e;border-radius:12px;overflow:hidden}
.convo-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;cursor:pointer;transition:background .2s}
.convo-header:hover{background:#1e1e36}
.convo-title{font-size:14px;font-weight:600;color:#f0c4e8;flex:1}
.convo-meta{display:flex;gap:12px;align-items:center;font-size:12px;color:#888}
.convo-meta .badge{background:#2a2a4a;padding:2px 8px;border-radius:10px}
.convo-messages{display:none;padding:0 18px 18px;border-top:1px solid #2a2a4a}
.convo-messages.open{display:block}
.msg{padding:10px 14px;margin-top:8px;border-radius:10px;font-size:13px;line-height:1.6;white-space:pre-wrap;word-wrap:break-word}
.msg.user{background:#16213e;border-left:3px solid #3498db;margin-right:40px}
.msg.assistant{background:#1a2e1a;border-left:3px solid #2ecc71;margin-left:40px}
.msg.system{background:#2a2a2a;border-left:3px solid #95a5a6;font-size:12px;color:#999;margin-right:20px;margin-left:20px}
.msg-role{font-size:11px;font-weight:600;text-transform:uppercase;margin-bottom:4px;letter-spacing:.5px}
.msg.user .msg-role{color:#3498db}
.msg.assistant .msg-role{color:#2ecc71}
.msg.system .msg-role{color:#95a5a6}
.convo-count{text-align:center;padding:12px;color:#888;font-size:13px}

/* Tab content */
.tab-content{display:none}
.tab-content.active{display:block}

/* Login screen */
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;position:fixed;inset:0;background:#0f0f1a;z-index:100}
.login-box{background:#1a1a2e;border-radius:16px;padding:32px;width:320px;text-align:center}
.login-box h2{color:#f0c4e8;font-size:20px;margin-bottom:8px}
.login-box p{color:#888;font-size:13px;margin-bottom:20px}
.login-box input{width:100%;padding:12px;background:#0f0f1a;border:1px solid #3a3a5a;border-radius:8px;color:#e0e0e0;font-size:14px;margin-bottom:12px}
.login-box input:focus{outline:none;border-color:#9b59b6}
.login-box button{width:100%;padding:12px;background:#9b59b6;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer}
.login-box button:hover{background:#8e44ad}
.login-error{color:#e74c3c;font-size:12px;margin-top:8px;display:none}
</style>
</head>
<body>

<!-- Login screen -->
<div class="login-screen" id="loginScreen">
<div class="login-box">
<h2>GirlTalk Insights</h2>
<p>Enter the dashboard password to continue</p>
<input type="password" id="loginPassword" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
<button onclick="doLogin()">Sign in</button>
<div class="login-error" id="loginError">Wrong password. Try again.</div>
</div>
</div>

<div id="appContent" style="display:none">
<div class="header">
<div><h1>GirlTalk Chat Insights</h1><div class="last-run" id="lastRun"></div></div>
<div class="header-actions">
<div class="week-picker" id="weekPicker" style="display:none">
<select id="weekSelect" onchange="loadWeekData(this.value)"></select>
</div>
<button class="run-btn" id="runBtn" onclick="runAnalysis()">Run Analysis Now</button>
</div>
</div>

<div class="status-box" id="statusBox">
  <div class="status-title" id="statusTitle"></div>
  <div class="status-msg" id="statusMsg"></div>
</div>

<div class="tabs">
<button class="tab active" onclick="switchTab('analysis')">Analysis</button>
<button class="tab" onclick="switchTab('conversations')">Conversations</button>
</div>

<!-- Analysis Tab -->
<div class="tab-content active" id="tab-analysis">
<div class="stats" id="stats"></div>
<div class="grid">
<div class="card"><h2>Sentiment Distribution</h2><canvas id="sentimentChart"></canvas></div>
<div class="card"><h2>Top Topics</h2><div id="topics"></div></div>
</div>
<div class="grid">
<div class="card"><h2>Pain Points</h2><div id="painPoints"></div></div>
<div class="card"><h2>Key Insights</h2><div id="insights"></div></div> </div> <div class="grid"> <div class="card" id="changesCard" style="display:none"><h2>Changes vs Previous Analysis</h2><div id="changes"></div></div>
</div>
</div>

<!-- Conversations Tab -->
<div class="tab-content" id="tab-conversations">
<div class="conversations-controls">
<select id="convoDays">
<option value="7">Last 7 days</option>
<option value="30" selected>Last 30 days</option>
<option value="90">Last 90 days</option>
<option value="365">Last year</option>
</select>
<input type="text" id="convoSearch" placeholder="Search conversations..." oninput="filterConversations()">
<button class="load-btn" id="loadConvosBtn" onclick="loadConversations()">Load Conversations</button>
</div>
<div class="convo-count" id="convoCount"></div>
<div class="convo-list" id="convoList">
<div class="status">Click "Load Conversations" to fetch chat sessions.</div>
</div>
</div>

<script>
firebase.initializeApp({apiKey:"AIzaSyDKig5LhFHLT6D1kGJrJKTLKP1z7cZymDs",authDomain:"girltalk-9b4f8.firebaseapp.com",projectId:"girltalk-9b4f8",appId:"1:718608150064:web:494d2ebd8fbfc02c5f87f5"});
var db=firebase.firestore();
var FUNCTION_URL="https://us-central1-girltalk-9b4f8.cloudfunctions.net/analyzeChats";
function getSecret(){return sessionStorage.getItem("dashboard_secret")||""}
var sentimentChart=null;
var allConversations=[];

function switchTab(name){
  document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("active")});
  document.querySelectorAll(".tab-content").forEach(function(t){t.classList.remove("active")});
  document.querySelector(".tab-content#tab-"+name).classList.add("active");
  document.querySelectorAll(".tab").forEach(function(t){
    if((name==="analysis"&&t.textContent==="Analysis")||(name==="conversations"&&t.textContent==="Conversations")){
      t.classList.add("active");
    }
  });
  // Show week picker only on analysis tab
  document.getElementById("weekPicker").style.display=(name==="analysis")?"flex":"none";
}

async function loadWeekData(docKey){
  var url=FUNCTION_URL+"?secret="+getSecret()+"&action=insights";
  if(docKey&&docKey!=="__latest__")url+="&week="+docKey;
  var r=await fetch(url);
  var j=await r.json();
  if(j.success&&j.data){renderAnalysis(j.data);}
  else{document.getElementById("stats").innerHTML='<div class="status">No data for this period.</div>';}
}

function renderAnalysis(d){
  document.getElementById("lastRun").textContent="Run: "+new Date(d.runDate).toLocaleString()+" | "+d.totalChatsAnalyzed+" chats, "+(d.totalMessagesAnalyzed||0)+" messages"+(d.weekKey?" | Week: "+d.weekKey:"");

  document.getElementById("stats").innerHTML=[
    {v:d.totalChatsAnalyzed,l:"Conversations"},
    {v:d.totalMessagesAnalyzed||0,l:"Messages"},
    {v:(d.engagement&&d.engagement.avgMessageCount||0).toFixed(1),l:"Avg Msgs/Chat"},
    {v:Math.round(d.sentiment&&d.sentiment.negative||0)+"%",l:"Negative Sentiment"}
  ].map(function(s){return '<div class="stat-card"><div class="value">'+s.v+'</div><div class="label">'+s.l+'</div></div>'}).join("");

  // Destroy old chart if exists
  if(sentimentChart){sentimentChart.destroy();sentimentChart=null}
  var ctx=document.getElementById("sentimentChart").getContext("2d");
  sentimentChart=new Chart(ctx,{type:"doughnut",data:{labels:["Positive","Neutral","Negative"],datasets:[{data:[d.sentiment&&d.sentiment.positive||0,d.sentiment&&d.sentiment.neutral||0,d.sentiment&&d.sentiment.negative||0],backgroundColor:["#2ecc71","#95a5a6","#e74c3c"],borderWidth:0}]},options:{responsive:true,plugins:{legend:{position:"bottom",labels:{color:"#ccc"}}}}});

  var maxCount=1;
  if(d.topics&&d.topics.length>0){for(var i=0;i<d.topics.length;i++){if(d.topics[i].count>maxCount)maxCount=d.topics[i].count}}
  var topicsHtml="";
  if(d.topics&&d.topics.length>0){for(var i=0;i<d.topics.length;i++){var t=d.topics[i];topicsHtml+='<div class="topic-bar"><div class="topic-name">'+t.name+'</div><div class="topic-fill"><div class="topic-fill-inner" style="width:'+(t.count/maxCount*100)+'%"></div></div><div class="topic-pct">'+t.percentage+'%</div></div>'}}
  else{topicsHtml='<div class="status">No topics</div>'}
  document.getElementById("topics").innerHTML=topicsHtml;

  var painHtml="";
  if(d.painPoints&&d.painPoints.length>0){for(var i=0;i<d.painPoints.length;i++){var p=d.painPoints[i];var snip="";if(p.exampleSnippets&&p.exampleSnippets.length>0){snip='<div class="snippet">"'+p.exampleSnippets[0]+'"</div>'}painHtml+='<div class="pain-point"><div><div class="pain-desc">'+p.description+'</div>'+snip+'</div><div class="pain-freq">'+p.frequency+'x</div></div>'}}
  else{painHtml='<div class="status">No pain points</div>'}
  document.getElementById("painPoints").innerHTML=painHtml;

  var insHtml="";
  if(d.keyInsights&&d.keyInsights.length>0){for(var i=0;i<d.keyInsights.length;i++){insHtml+='<div class="insight">'+d.keyInsights[i]+'</div>'}}
  else{insHtml='<div class="status">No insights</div>'}
  document.getElementById("insights").innerHTML=insHtml;
  if(d.comparisonSummary&&d.comparisonSummary.changes&&d.comparisonSummary.changes.length>0){document.getElementById("changesCard").style.display="block";var chHtml="";for(var i=0;i<d.comparisonSummary.changes.length;i++){chHtml+='<div class="insight">'+d.comparisonSummary.changes[i]+'</div>'}document.getElementById("changes").innerHTML=chHtml}else{document.getElementById("changesCard").style.display="none"}
}

async function loadData(){
  try{
    var r=await fetch(FUNCTION_URL+"?secret="+getSecret()+"&action=insights");
    var j=await r.json();
    if(j.success&&j.data){
      renderAnalysis(j.data);
    } else {
      document.getElementById("stats").innerHTML='<div class="status">No analysis data yet. Click "Run Analysis Now".</div>';
    }
  }catch(e){
    document.getElementById("stats").innerHTML='<div class="status">Could not load data.</div>';
  }
}

async function loadConversations(){
  var btn=document.getElementById("loadConvosBtn");
  btn.disabled=true;btn.textContent="Loading...";
  var days=document.getElementById("convoDays").value;
  try{
    var r=await fetch(FUNCTION_URL+"?secret="+getSecret()+"&action=conversations&days="+days);
    var j=await r.json();
    if(j.success){
      allConversations=j.conversations||[];
      document.getElementById("convoCount").textContent=allConversations.length+" conversations found";
      renderConversations(allConversations);
    } else {
      document.getElementById("convoList").innerHTML='<div class="status">Error: '+(j.error||"Unknown error")+'</div>';
    }
  }catch(e){
    document.getElementById("convoList").innerHTML='<div class="status">Error loading conversations.</div>';
  }
  btn.disabled=false;btn.textContent="Load Conversations";
}

function filterConversations(){
  var q=document.getElementById("convoSearch").value.toLowerCase();
  if(!q){renderConversations(allConversations);return}
  var filtered=allConversations.filter(function(c){
    if(c.title&&c.title.toLowerCase().indexOf(q)>=0)return true;
    if(c.summary&&c.summary.toLowerCase().indexOf(q)>=0)return true;
    for(var i=0;i<c.messages.length;i++){
      if(c.messages[i].content&&c.messages[i].content.toLowerCase().indexOf(q)>=0)return true;
    }
    return false;
  });
  document.getElementById("convoCount").textContent=filtered.length+" of "+allConversations.length+" conversations";
  renderConversations(filtered);
}

function renderConversations(convos){
  if(convos.length===0){
    document.getElementById("convoList").innerHTML='<div class="status">No conversations found.</div>';
    return;
  }
  var html="";
  for(var i=0;i<convos.length;i++){
    var c=convos[i];
    var date=c.createdAt?new Date(c.createdAt).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"2-digit",minute:"2-digit"}):"Unknown date";
    var title=c.title||"Untitled conversation";
    // Escape HTML
    title=title.replace(/</g,"&lt;").replace(/>/g,"&gt;");

    html+='<div class="convo-item">';
    html+='<div class="convo-header" onclick="toggleConvo(this)">';
    html+='<div class="convo-title">'+title+'</div>';
    html+='<div class="convo-meta">';
    html+='<span class="badge">'+c.messageCount+' msgs</span>';
    html+='<span>'+date+'</span>';
    html+='</div></div>';
    html+='<div class="convo-messages" id="convo-'+i+'">';

    for(var j=0;j<c.messages.length;j++){
      var m=c.messages[j];
      var content=(m.content||"").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      // Truncate very long system messages
      if(m.role==="system"&&content.length>500){
        content=content.substring(0,500)+"... [truncated]";
      }
      html+='<div class="msg '+m.role+'">';
      html+='<div class="msg-role">'+m.role+'</div>';
      html+=content;
      html+='</div>';
    }
    html+='</div></div>';
  }
  document.getElementById("convoList").innerHTML=html;
}

function toggleConvo(el){
  var msgs=el.nextElementSibling;
  msgs.classList.toggle("open");
}

function setStatus(type, title, msg){
  var box=document.getElementById("statusBox");
  box.className="status-box visible "+type;
  document.getElementById("statusTitle").textContent=title;
  document.getElementById("statusMsg").textContent=msg;
}
function hideStatus(){
  document.getElementById("statusBox").className="status-box";
}

async function runAnalysis(){
  var btn=document.getElementById("runBtn");
  btn.disabled=true;
  btn.textContent="Analyzing...";
  setStatus("","Running analysis...","Fetching conversations and sending to Gemini. This can take 1–2 minutes. Please wait.");
  try{
    var r=await fetch(FUNCTION_URL+"?secret="+getSecret()+"&days=30");
    var j=await r.json();
    if(j.status==="ok"){
      if(j.remaining>0){
        setStatus("success","Done — "+j.totalNew+" conversations analyzed",""+j.remaining+" more to process. Reloading, then click Run Analysis Now again to continue.");
        setTimeout(function(){location.reload()},2500);
      } else {
        setStatus("success","All caught up!","Analyzed "+j.totalNew+" conversations. Reloading results...");
        setTimeout(function(){location.reload()},2000);
      }
    } else {
      var errMsg=j.message||j.error||"Unknown error";
      setStatus("error","Analysis failed",errMsg);
      btn.disabled=false;
      btn.textContent="Run Analysis Now";
    }
  }catch(e){
    setStatus("error","Could not reach the server",e.message||"Check your connection and try again.");
    btn.disabled=false;
    btn.textContent="Run Analysis Now";
  }
}

// Login: verify password against the Cloud Function
async function doLogin(){
  var pw=document.getElementById("loginPassword").value.trim();
  if(!pw)return;
  try{
    var r=await fetch(FUNCTION_URL+"?secret="+encodeURIComponent(pw)+"&action=ping");
    var j=await r.json();
    if(j.success!==false){
      sessionStorage.setItem("dashboard_secret",pw);
      document.getElementById("loginScreen").style.display="none";
      document.getElementById("appContent").style.display="block";
      loadData();
    }else{
      document.getElementById("loginError").style.display="block";
    }
  }catch(e){
    document.getElementById("loginError").style.display="block";
  }
}
window.doLogin=doLogin;
window.toggleConvo=toggleConvo;

// Auto-login if session still valid
if(getSecret()){
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("appContent").style.display="block";
  loadData();
}
</script>
</div><!-- /appContent -->
</body>
</html>
